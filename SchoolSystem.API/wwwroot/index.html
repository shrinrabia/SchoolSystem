<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>School Management System</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        button,
        input {
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .delete-btn {
            background-color: #dc3545;
        }

        .delete-btn:hover {
            background-color: #a71d2a;
        }
    </style>
</head>

<body>
    <h1>School Management System</h1>
    <p>Use the interface below to test the Minimal API CRUD endpoints.</p>

    <!-- Teachers -->
    <div class="section" id="teachers">
        <h2>Teachers</h2>
        <button onclick="loadTeachers()">Load Teachers</button>
        <div id="teachersList"></div>
        <h3>Add Teacher</h3>
        <input type="text" id="tName" placeholder="Name">
        <input type="email" id="tEmail" placeholder="Email">
        <button onclick="addTeacher()">Add</button>
    </div>

    <!-- Courses -->
    <div class="section" id="courses">
        <h2>Courses</h2>
        <button onclick="loadCourses()">Load Courses</button>
        <div id="coursesList"></div>
        <h3>Add Course</h3>
        <input type="text" id="cName" placeholder="Name">
        <input type="text" id="cDesc" placeholder="Description">
        <input type="number" id="cTeacherId" placeholder="Teacher ID">
        <button onclick="addCourse()">Add</button>
    </div>

    <!-- Participants -->
    <div class="section" id="participants">
        <h2>Participants</h2>
        <button onclick="loadParticipants()">Load Participants</button>
        <div id="participantsList"></div>
        <h3>Add Participant</h3>
        <input type="text" id="pName" placeholder="Name">
        <input type="email" id="pEmail" placeholder="Email">
        <button onclick="addParticipant()">Add</button>
    </div>

    <!-- Course Instances -->
    <div class="section" id="instances">
        <h2>Course Instances</h2>
        <button onclick="loadInstances()">Load Instances</button>
        <div id="instancesList"></div>
        <h3>Add Course Instance</h3>
        <input type="number" id="ciCourseId" placeholder="Course ID">
        <input type="date" id="ciStart">
        <input type="date" id="ciEnd">
        <button onclick="addInstance()">Add</button>
    </div>

    <!-- Registrations -->
    <div class="section" id="registrations">
        <h2>Registrations</h2>
        <button onclick="loadRegistrations()">Load Registrations</button>
        <div id="registrationsList"></div>
        <h3>Register Participant to Course Instance</h3>
        <input type="number" id="regParticipantId" placeholder="Participant ID">
        <input type="number" id="regInstanceId" placeholder="Course Instance ID">
        <button onclick="addRegistration()">Add</button>
    </div>

    <script>
        // --- Teachers ---
        async function loadTeachers() {
            const res = await fetch('/api/teachers');
            const data = await res.json();
            const list = data.map(t => `<tr><td>${t.id}</td><td>${t.name}</td><td>${t.email}</td>
                <td><button class="delete-btn" onclick="deleteResource('/api/teachers/${t.id}', loadTeachers)">Delete</button></td></tr>`).join('');
            document.getElementById('teachersList').innerHTML = `<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>${list}</table>`;
        }
        async function addTeacher() {
            await fetch('/api/teachers', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: document.getElementById('tName').value, email: document.getElementById('tEmail').value })
            });
            loadTeachers();
        }

        // --- Courses ---
        async function loadCourses() {
            const res = await fetch('/api/courses');
            const data = await res.json();
            const list = data.map(c => `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.description}</td><td>Teacher ID: ${c.teacherId}</td>
                <td><button class="delete-btn" onclick="deleteResource('/api/courses/${c.id}', loadCourses)">Delete</button></td></tr>`).join('');
            document.getElementById('coursesList').innerHTML = `<table><tr><th>ID</th><th>Name</th><th>Description</th><th>Teacher ID</th><th>Actions</th></tr>${list}</table>`;
        }
        async function addCourse() {
            await fetch('/api/courses', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('cName').value,
                    description: document.getElementById('cDesc').value,
                    teacherId: parseInt(document.getElementById('cTeacherId').value)
                })
            });
            loadCourses();
        }

        // --- Participants ---
        async function loadParticipants() {
            const res = await fetch('/api/participants');
            const data = await res.json();
            const list = data.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.email}</td>
                <td><button class="delete-btn" onclick="deleteResource('/api/participants/${p.id}', loadParticipants)">Delete</button></td></tr>`).join('');
            document.getElementById('participantsList').innerHTML = `<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Actions</th></tr>${list}</table>`;
        }
        async function addParticipant() {
            await fetch('/api/participants', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: document.getElementById('pName').value, email: document.getElementById('pEmail').value })
            });
            loadParticipants();
        }

        // --- Course Instances ---
        async function loadInstances() {
            const res = await fetch('/api/courseinstances');
            const data = await res.json();
            const list = data.map(i => `<tr><td>${i.id}</td><td>${i.courseId}</td><td>${i.startDate?.substring(0, 10)}</td><td>${i.endDate?.substring(0, 10)}</td>
                <td><button class="delete-btn" onclick="deleteResource('/api/courseinstances/${i.id}', loadInstances)">Delete</button></td></tr>`).join('');
            document.getElementById('instancesList').innerHTML = `<table><tr><th>ID</th><th>Course ID</th><th>Start</th><th>End</th><th>Actions</th></tr>${list}</table>`;
        }
        async function addInstance() {
            await fetch('/api/courseinstances', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    courseId: parseInt(document.getElementById('ciCourseId').value),
                    startDate: document.getElementById('ciStart').value,
                    endDate: document.getElementById('ciEnd').value
                })
            });
            loadInstances();
        }

        // --- Registrations ---
        async function loadRegistrations() {
            const res = await fetch('/api/registrations');
            const data = await res.json();
            const list = data.map(r => `<tr><td>${r.id}</td><td>${r.participantId}</td><td>${r.courseInstanceId}</td><td>${r.registrationDate?.substring(0, 10)}</td>
                <td><button class="delete-btn" onclick="deleteResource('/api/registrations/${r.id}', loadRegistrations)">Delete</button></td></tr>`).join('');
            document.getElementById('registrationsList').innerHTML = `<table><tr><th>ID</th><th>Participant ID</th><th>Instance ID</th><th>Date</th><th>Actions</th></tr>${list}</table>`;
        }
        async function addRegistration() {
            await fetch('/api/registrations', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    participantId: parseInt(document.getElementById('regParticipantId').value),
                    courseInstanceId: parseInt(document.getElementById('regInstanceId').value)
                })
            });
            loadRegistrations();
        }

        // Generic Delete
        async function deleteResource(url, callback) {
            await fetch(url, { method: 'DELETE' });
            callback();
        }

        // Load initially
        loadTeachers();
        loadCourses();
        loadParticipants();
        loadInstances();
        loadRegistrations();
    </script>
</body>

</html>
